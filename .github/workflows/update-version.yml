name: Check Upstream Version

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  IMAGE_NAME: realm
  UPSTREAM_REPO: zhboner/realm

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check latest upstream release
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="$(tr -d '[:space:]' < VERSION)"
          CURRENT_NUMBER="${CURRENT_VERSION#v}"
          LATEST_TAG="$(gh release view --repo "${UPSTREAM_REPO}" --json tagName -q .tagName)"
          LATEST_VERSION="${LATEST_TAG#v}"

          if [[ -z "${CURRENT_NUMBER}" || -z "${LATEST_VERSION}" ]]; then
            echo "Unable to determine current or latest version" >&2
            exit 1
          fi

          echo "current=${CURRENT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "latest=${LATEST_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "latest_tag=${LATEST_TAG}" >> "${GITHUB_OUTPUT}"

          if [[ "${CURRENT_NUMBER}" == "${LATEST_VERSION}" ]]; then
            echo "Already up to date: ${CURRENT_VERSION}"
            exit 0
          fi

          AMD64_SHA256="$(
            curl -fsSL "https://github.com/${UPSTREAM_REPO}/releases/download/${LATEST_TAG}/realm-x86_64-unknown-linux-musl.tar.gz" \
              | sha256sum \
              | awk '{print $1}'
          )"
          ARM64_SHA256="$(
            curl -fsSL "https://github.com/${UPSTREAM_REPO}/releases/download/${LATEST_TAG}/realm-aarch64-unknown-linux-musl.tar.gz" \
              | sha256sum \
              | awk '{print $1}'
          )"

          perl -0pi -e "s/\Q${CURRENT_NUMBER}\E/${LATEST_VERSION}/g" \
            VERSION Dockerfile README.md
          perl -0pi -e "s/^ARG REALM_AMD64_SHA256=.*/ARG REALM_AMD64_SHA256=${AMD64_SHA256}/m" Dockerfile
          perl -0pi -e "s/^ARG REALM_ARM64_SHA256=.*/ARG REALM_ARM64_SHA256=${ARM64_SHA256}/m" Dockerfile

      - name: Create update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.AUTOMATION_TOKEN }}
          branch: automation/update-realm
          delete-branch: true
          commit-message: Update realm to ${{ steps.upstream.outputs.latest_tag }}
          title: Update realm to ${{ steps.upstream.outputs.latest_tag }}
          body: |
            Automated upstream version update.

            - Current: ${{ steps.upstream.outputs.current }}
            - Latest: ${{ steps.upstream.outputs.latest_tag }}
            - Source: https://github.com/zhboner/realm/releases/latest
          labels: |
            dependencies
            docker
