name: Docker Image Build and Push

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: realm

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="$(tr -d '[:space:]' < VERSION)"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "semver=${VERSION#v}" >> "${GITHUB_OUTPUT}"
          echo "Building realm ${VERSION}"

      - name: Lint Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint:v2.12.0-alpine \
            hadolint --ignore DL3006 --ignore DL3018 - < Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Check Dockerfile build rules
        run: |
          docker buildx build \
            --check \
            --build-arg VERSION=${{ steps.version.outputs.version }} \
            .

      - name: Build smoke-test image
        id: smoke_build
        run: |
          docker buildx build \
            --load \
            --platform linux/amd64 \
            --tag local/${IMAGE_NAME}:ci \
            --build-arg VERSION=${{ steps.version.outputs.version }} \
            .

      - name: Smoke test
        run: docker run --rm local/${IMAGE_NAME}:ci --version

      - name: Scan image vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: local/${{ env.IMAGE_NAME }}:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln
          exit-code: "1"

      - name: Generate Trivy SARIF
        if: always() && steps.smoke_build.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: local/${{ env.IMAGE_NAME }}:ci
          format: sarif
          output: trivy-results.sarif
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

  automerge:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: gh pr merge "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --admin --squash --delete-branch

  build:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="$(tr -d '[:space:]' < VERSION)"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "semver=${VERSION#v}" >> "${GITHUB_OUTPUT}"
          echo "Building realm ${VERSION}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=Docker image for realm, a simple high-performance relay server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.semver }},enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          repository: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          short-description: "Docker image for realm, a simple high-performance relay server"
          readme-filepath: ./README.md
